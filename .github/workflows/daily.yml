name: daily-run

on:
  schedule:
    # 17:03 JST = 08:03 UTC
    - cron: '3 8 * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run main.py
        env:
          APP_CONFIG_JSON: ${{ secrets.APP_CONFIG_JSON }}
        run: |
          python main.py
