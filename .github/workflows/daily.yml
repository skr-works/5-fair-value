name: Daily Fair Value Sheet Update

on:
  schedule:
    # GitHub Actions cron is UTC. 17:03 JST = 08:03 UTC.
    - cron: '3 8 * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run main.py
        env:
          APP_CONFIG_JSON: ${{ secrets.APP_CONFIG_JSON }}
        run: python main.py
